<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Draft 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:  #006747;
      --gold:   #C9A84C;
      --cream:  #f0ede8;
      --red:    #c0392b;
      --ink:    #1a1a1a;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0ede8;
      min-height: 100vh;
      padding-bottom: 48px;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 3px solid var(--green);
      text-align: center;
      padding: 22px 16px 16px;
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.01em;
    }

    #tournament-name {
      font-size: 0.72rem;
      color: #888;
      margin-top: 5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
    }

    #meta {
      font-size: 0.73rem;
      color: var(--gold);
      margin-top: 5px;
      font-weight: 400;
    }

    /* ── Main content ── */
    main {
      max-width: 560px;
      margin: 28px auto 0;
      padding: 0 12px;
    }

    /* ── Leaderboard card ── */
    .card {
      background: #fff;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      border-top: 3px solid var(--green);
    }

    .card-header {
      display: grid;
      grid-template-columns: 36px 1fr 72px;
      background: var(--green);
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 9px 14px;
    }

    .card-header span:last-child { text-align: right; }

    .lb-row {
      display: grid;
      grid-template-columns: 36px 1fr 72px;
      padding: 14px 14px;
      border-bottom: 1px solid var(--cream);
      cursor: pointer;
      transition: background 0.12s;
      align-items: center;
    }

    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: #fafaf8; }
    .lb-row.active { background: #f5f9f6; border-left: 3px solid var(--green); }

    .lb-pos {
      font-size: 0.82rem;
      font-weight: 600;
      color: #aaa;
    }

    .lb-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
    }

    .lb-score {
      font-size: 1.1rem;
      font-weight: 700;
      text-align: right;
      font-family: 'Source Sans 3', sans-serif;
    }

    .score-under { color: var(--red); }
    .score-over  { color: #333; }
    .score-even  { color: var(--green); }

    /* ── Team detail card ── */
    #team-detail {
      display: none;
      margin-top: 12px;
    }

    #team-detail.visible { display: block; }

    .detail-header {
      background: var(--green);
      color: #fff;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      font-weight: 600;
    }

    .detail-header .sweeper-score {
      margin-left: 8px;
      font-size: 0.8rem;
      color: var(--gold);
      font-family: 'Source Sans 3', sans-serif;
      font-style: normal;
      font-weight: 400;
    }

    .close-btn {
      margin-left: auto;
      cursor: pointer;
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      line-height: 1;
      padding: 2px 4px;
      background: none;
      border: none;
      font-style: normal;
      font-family: 'Source Sans 3', sans-serif;
    }

    .close-btn:hover { color: #fff; }

    /* ── Golfer row ── */
    .golfer-row {
      padding: 12px 14px;
      border-bottom: 1px solid var(--cream);
      background: #fff;
    }

    .golfer-row:last-child { border-bottom: none; }
    .golfer-row.is-captain { background: #fefefe; border-left: 1px solid rgba(201,168,76,0.35); }

    .golfer-top {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 8px;
    }

    .golfer-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--ink);
    }

    .badge {
      font-size: 0.58rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 2px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .badge-captain {
      background: var(--gold);
      color: #fff;
    }

    .badge-mc {
      background: var(--red);
      color: #fff;
    }

    .badge-win {
      background: var(--gold);
      color: #fff;
    }

    .badge-wd {
      background: #aaa;
      color: #fff;
    }

    /* ── Round scores ── */
    .rounds {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .round-pill {
      background: #f5f5f2;
      border-radius: 2px;
      padding: 4px 8px;
      text-align: center;
      min-width: 46px;
    }

    .round-pill.captain-r4 {
      background: #fdfbf0;
      border: 2px solid var(--gold);
      box-shadow: 0 0 0 1px rgba(201,168,76,0.15);
    }

    .round-label {
      font-size: 0.58rem;
      font-weight: 700;
      color: #aaa;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .round-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--ink);
      margin-top: 1px;
    }

    .round-value.under { color: var(--red); }
    .round-value.over  { color: #333; }
    .round-value.empty { color: #ddd; }
    .round-value.thru  { font-size: 0.75rem; }

    .multiplier-note {
      font-size: 0.56rem;
      color: var(--gold);
      font-weight: 700;
      margin-top: 1px;
    }

    .multiplier-note.mc  { color: var(--red); }
    .multiplier-note.win { color: var(--gold); }

    /* ── Tabs ── */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid var(--green);
    }

    .tab {
      flex: 1;
      padding: 10px;
      background: none;
      border: none;
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #aaa;
      cursor: pointer;
      transition: color 0.12s;
    }

    .tab.active { color: var(--green); border-bottom: 2px solid var(--green); margin-bottom: -2px; }
    .tab:hover  { color: var(--green); }

    /* ── Field leaderboard ── */
    .field-row  { grid-template-columns: 36px 1fr 72px 60px; }
    .field-picked { background: #f5f9f6; }
    .field-thru { font-size: 0.78rem; color: #888; text-align: right; }
    .field-header span:nth-child(3),
    .field-header span:nth-child(4) { text-align: right; }

    /* ── States ── */
    .loading {
      text-align: center;
      color: #aaa;
      padding: 48px 16px;
      font-size: 0.9rem;
      background: #fff;
    }

    .error-card {
      background: #fff;
      border-radius: 2px;
      padding: 28px 16px;
      text-align: center;
    }

    .error-card p { color: var(--red); font-size: 0.9rem; }
    .error-card small { color: #aaa; font-size: 0.78rem; margin-top: 6px; display: block; }
  </style>
</head>
<body>

<header>
  <h1><span aria-hidden="true">&#9971;</span> Masters Draft 2026</h1>
  <div id="tournament-name"></div>
  <div id="meta">Fetching live scores...</div>
</header>

<div class="tabs">
  <button class="tab active" data-tab="sweepstake" onclick="switchTab('sweepstake')">Sweepstake</button>
  <button class="tab" data-tab="field" onclick="switchTab('field')">Live Leaderboard</button>
</div>

<main>
  <div id="tab-sweepstake">
    <div id="leaderboard-container">
      <div class="loading">Loading scores...</div>
    </div>
    <div id="team-detail"></div>
  </div>
  <div id="tab-field" hidden>
    <div id="field-container">
      <div class="loading">Loading scores...</div>
    </div>
  </div>
</main>

<script>
/*
 * ═══════════════════════════════════════════════════════════════
 * HOW THIS PAGE WORKS (overview)
 * ═══════════════════════════════════════════════════════════════
 *
 * On load (and every 10 minutes):
 *   1. fetchScores()  → calls ESPN API to get live golf scores
 *   2. parseScores()  → extracts each golfer's total + round scores
 *   3. calcSweeper()  → adds up each person's 4 golfers (+ captain bonus)
 *   4. renderLeaderboard() → sorts and draws the main table
 *
 * On click:
 *   toggleDetail() → expands that person's 4 golfers below the table
 *
 * TO UPDATE PICKS (Wednesday after draft):
 *   - Replace golfer names in PICKS below
 *   - Names must match ESPN exactly (check browser console for warnings)
 *   - Leave captain as null until Saturday night
 *
 * TO SET CAPTAINS (Saturday night before R4):
 *   - Change captain: null  →  captain: "Golfer Name"  for each person
 * ═══════════════════════════════════════════════════════════════
 */

// ─────────────────────────────────────────────────────────────────
// PICKS
// The 6 sweepers and their 4 golfers each.
// captain: null  →  no bonus applied yet
// captain: "Name"  →  that golfer's R4 score is doubled on Sunday
//
// ⚠️  Names must match ESPN's displayName exactly.
//     Open browser console after loading — any mismatches show as warnings.
// ─────────────────────────────────────────────────────────────────
const PICKS = {
  "Toz": {
    team:    "The Kitsilano Thunderclappers",
    golfers: ["Rory McIlroy", "Justin Rose", "Shane Lowry", "Sungjae Im"],
    captain: "Sungjae Im"
  },
  "Liam": {
    team:    "Knorcks of Augusta",
    golfers: ["Bryson DeChambeau", "Hideki Matsuyama", "Min Woo Lee", "Russell Henley"],
    captain: "Hideki Matsuyama"
  },
  "Fred": {
    team:    "Lions Gate Links",
    golfers: ["Cameron Young", "Tommy Fleetwood", "Akshay Bhatia", "Adam Scott"],
    captain: "Tommy Fleetwood"
  },
  "JW": {
    team:    "The Wright on Par",
    golfers: ["Scottie Scheffler", "Robert MacIntyre", "Chris Gotterup", "Collin Morikawa"],
    captain: "Robert MacIntyre"
  },
  "OJ": {
    team:    "Moneyballs GC",
    golfers: ["Jon Rahm", "Matt Fitzpatrick", "Brooks Koepka", "Jordan Spieth"],
    captain: "Jordan Spieth"
  },
  "Simo": {
    team:    "Le Bloc Simo",
    golfers: ["Ludvig Åberg", "Xander Schauffele", "Patrick Reed", "Si Woo Kim"],
    captain: "Patrick Reed"
  }
};

// ─────────────────────────────────────────────────────────────────
// CONFIG
// API_URL: where we get live scores from (ESPN's unofficial golf API)
// REFRESH_MS: how often to re-fetch (10 minutes = 600,000 ms)
//
// ⚠️  Masters week: if scores don't load on Thursday, change
//     league=pga  →  league=masters  in the URL below
// ─────────────────────────────────────────────────────────────────
const API_URL    = "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga";
const REFRESH_MS = 10 * 60 * 1000; // 10 minutes

// ─────────────────────────────────────────────────────────────────
// STATE  (don't touch — managed automatically)
// golferData:    live scores keyed by golfer name, filled by parseScores()
// activeSweeper: which sweeper's team is currently expanded (or null)
// nextRefreshAt: timestamp of the next auto-refresh
// countdownTimer: the interval that ticks the countdown clock
// lastUpdated:   when scores were last successfully fetched
// ─────────────────────────────────────────────────────────────────
let golferData     = {};
let activeSweeper  = null;
let activeTab      = 'sweepstake';
let nextRefreshAt  = null;
let countdownTimer = null;
let lastUpdated    = null;

// ─────────────────────────────────────────────────────────────────
// FETCH
// Calls the ESPN API and kicks off the parse + render chain.
// Runs on page load and every 10 minutes automatically.
// If the fetch fails, shows an error in the header and retries next cycle.
// ─────────────────────────────────────────────────────────────────
async function fetchScores() {
  try {
    const res = await fetch(API_URL + '&_=' + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    parseScores(data);
    renderLeaderboard();

    lastUpdated = new Date();
    nextRefreshAt = Date.now() + REFRESH_MS;
    updateMeta();

  } catch (err) {
    console.error("[masters-draft] Fetch error:", err);
    document.getElementById("meta").textContent = "Error fetching scores — retrying in 10 min";
  }
}

// ─────────────────────────────────────────────────────────────────
// PARSE
// Takes raw ESPN API data and builds the golferData lookup table:
//   golferData["Rory McIlroy"] = { total: -8, rounds: [...], thru: "F", isCut: false }
//
// Also logs a warning for any golfer in PICKS not found in the API —
// that means the name in PICKS doesn't match ESPN's spelling.
// ─────────────────────────────────────────────────────────────────
function parseScores(data) {
  golferData = {};

  const event       = data.events?.[0];
  const competitors = event?.competitions?.[0]?.competitors ?? [];

  const tournamentEl = document.getElementById("tournament-name");
  if (tournamentEl && event?.name) tournamentEl.textContent = event.name;

  for (const comp of competitors) {
    const name = comp.athlete?.displayName;
    if (!name) continue;

    const statusStr = comp.status?.type?.name ?? "";
    const thruRaw   = comp.status?.displayValue ?? "";

    // linescores: one entry per round played, parsed as score to par
    const rounds = (comp.linescores ?? []).map(ls => ({
      value:   parseToPar(ls.displayValue),
      display: ls.displayValue ?? "–"
    }));

    // Compute total from linescores (sum of per-round scores to par).
    // ESPN's comp.score.displayValue lags mid-round, but linescores update live.
    const totalVal = rounds.reduce((sum, r) => sum + r.value, 0);

    golferData[name] = {
      total:        totalVal,
      totalDisplay: fmtScore(totalVal),
      rounds,
      thru:         fmtThru(thruRaw, statusStr),
      isCut:        /CUT/.test(statusStr),
      isWD:         /WITHDRAWN|WD/.test(statusStr),
      isWinner:     comp.winner === true,
    };
  }

  // Warn about any name mismatches — fix spellings against these warnings
  for (const [sweeper, { golfers }] of Object.entries(PICKS)) {
    for (const name of golfers) {
      if (!golferData[name]) {
        console.warn(`[masters-draft] ⚠️ No match for "${name}" (${sweeper}) — check spelling vs ESPN`);
      }
    }
  }

}

// ─────────────────────────────────────────────────────────────────
// SCORE CALCULATION
// Adds up a sweeper's combined score from their 4 golfers.
//
// Normal scoring:  total = golfer1 + golfer2 + golfer3 + golfer4
// Captain bonus:   if R4 is live and captain is set,
//                  add one extra copy of the captain's R4 score
//                  (this doubles their R4 contribution)
// MC penalty:      +5 added to any golfer who misses the cut
// Winner bonus:    -5 applied if a golfer wins the tournament
//                  (ESPN sets comp.winner = true only when event is final)
// ─────────────────────────────────────────────────────────────────
function calcSweeper(key) {
  const { golfers, captain } = PICKS[key];

  let total = 0;
  for (const name of golfers) {
    const g = golferData[name];
    let score = g?.total ?? 0;
    if (g?.isCut)    score += 5;  // MC penalty
    if (g?.isWinner) score -= 5;  // Winner bonus
    total += score;
  }

  if (captain && golferData[captain]) {
    const r4 = golferData[captain].rounds[3]; // index 3 = Round 4
    if (r4 && r4.value !== null) {
      total += r4.value; // extra copy = double the R4 contribution
    }
  }

  return total;
}

// ─────────────────────────────────────────────────────────────────
// RENDER LEADERBOARD
// Calculates every sweeper's score, sorts lowest-to-highest (golf),
// and draws the main 6-row table.
// Called after every fetch and after any click interaction.
// ─────────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const sorted = Object.keys(PICKS)
    .map(key => ({ key, score: calcSweeper(key) }))
    .sort((a, b) => a.score - b.score);

  let html = `<div class="card">
    <div class="card-header">
      <span>#</span><span>Player</span><span>Score</span>
    </div>`;

  sorted.forEach(({ key, score }, i) => {
    const cls    = score < 0 ? "score-under" : score > 0 ? "score-over" : "score-even";
    const active = key === activeSweeper ? "active" : "";
    html += `
      <div class="lb-row ${active}" role="button" tabindex="0" onclick="toggleDetail('${key}')" onkeydown="if(event.key==='Enter'||event.key===' ')toggleDetail('${key}')">
        <span class="lb-pos">${i + 1}</span>
        <span class="lb-name">${key}</span>
        <span class="lb-score ${cls}">${fmtScore(score)}</span>
      </div>`;
  });

  html += `</div>`;
  document.getElementById("leaderboard-container").innerHTML = html;

  if (activeSweeper) renderDetail(activeSweeper);
  if (activeTab === 'field') renderFieldLeaderboard();
}

// ─────────────────────────────────────────────────────────────────
// RENDER TEAM DETAIL
// Draws the expanded card below the leaderboard showing a sweeper's
// 4 golfers with their individual round-by-round scores.
// Captain row is highlighted gold. Captain's R4 pill shows doubled score.
// ─────────────────────────────────────────────────────────────────
function renderDetail(key) {
  const { team, golfers, captain } = PICKS[key];
  const sweeperScore = calcSweeper(key);
  const detailEl = document.getElementById("team-detail");

  let html = `
    <div class="card">
      <div class="detail-header">
        ${team}
        <span class="sweeper-score">${key} · ${fmtScore(sweeperScore)} combined</span>
        <button class="close-btn" onclick="closeDetail()" aria-label="Close">&#10005;</button>
      </div>`;

  for (const name of golfers) {
    const g = golferData[name];
    const isCaptain = name === captain;
    const isCut     = g?.isCut     ?? false;
    const isWD      = g?.isWD      ?? false;
    const isWinner  = g?.isWinner  ?? false;

    html += `<div class="golfer-row ${isCaptain ? "is-captain" : ""}">
      <div class="golfer-top">
        <span class="golfer-name">${name}</span>
        ${isCaptain ? `<span class="badge badge-captain">C</span>` : ""}
        ${isWinner  ? `<span class="badge badge-win">WIN</span>` : ""}
        ${isCut     ? `<span class="badge badge-mc">MC</span>` : ""}
        ${isWD      ? `<span class="badge badge-wd">WD</span>` : ""}
      </div>
      <div class="rounds">`;

    // Total pill — shows adjusted score (MC +5, WIN -5, captain R4×2 applied)
    const rawTot = g?.total ?? 0;
    let adjTot = rawTot;
    let totNote = "";
    if (isCut)      { adjTot += 5; totNote = `<div class="multiplier-note mc">+5 MC</div>`; }
    if (isWinner)   { adjTot -= 5; totNote = `<div class="multiplier-note win">-5 WIN</div>`; }
    const r4val = g?.rounds[3]?.value;
    if (isCaptain && r4val != null) { adjTot += r4val; totNote += `<div class="multiplier-note">+R4×2</div>`; }
    const totCls = adjTot < 0 ? "under" : adjTot > 0 ? "over" : "";
    html += `<div class="round-pill">
      <div class="round-label">Tot</div>
      <div class="round-value ${totCls}">${g ? fmtScore(adjTot) : "–"}</div>
      ${totNote}
    </div>`;

    // R1–R4 pills
    ["R1","R2","R3","R4"].forEach((label, idx) => {
      const r = g?.rounds[idx];
      const isCaptainR4 = isCaptain && idx === 3;

      if (r && r.value !== null) {
        let displayVal = fmtScore(r.value);
        let multiplierNote = "";
        if (isCaptainR4) {
          displayVal = fmtScore(r.value * 2);
          multiplierNote = `<div class="multiplier-note">&#215;2</div>`;
        }
        const rCls = r.value < 0 ? "under" : r.value > 0 ? "over" : "";
        html += `<div class="round-pill ${isCaptainR4 ? "captain-r4" : ""}">
          <div class="round-label">${label}</div>
          <div class="round-value ${rCls}">${displayVal}</div>
          ${multiplierNote}
        </div>`;
      } else {
        html += `<div class="round-pill ${isCaptainR4 ? "captain-r4" : ""}">
          <div class="round-label">${label}</div>
          <div class="round-value empty">–</div>
        </div>`;
      }
    });

    // Thru pill
    html += `<div class="round-pill">
      <div class="round-label">Thru</div>
      <div class="round-value thru">${g?.thru ?? "–"}</div>
    </div>`;

    html += `</div></div>`;  // close .rounds + .golfer-row
  }

  html += `</div>`;  // close .card
  detailEl.innerHTML = html;
  detailEl.classList.add("visible");
  detailEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// ─────────────────────────────────────────────────────────────────
// INTERACTIONS
// toggleDetail(): called when a leaderboard row is clicked
//   - if that sweeper is already open → close it
//   - otherwise → open that sweeper's team detail
// closeDetail(): hides the team detail card and clears the selection
// ─────────────────────────────────────────────────────────────────
function toggleDetail(key) {
  if (activeSweeper === key) {
    closeDetail();
  } else {
    activeSweeper = key;
    renderLeaderboard();
  }
}

function closeDetail() {
  activeSweeper = null;
  document.getElementById("team-detail").classList.remove("visible");
  renderLeaderboard();
}

// ─────────────────────────────────────────────────────────────────
// HELPERS
// parseToPar(): converts ESPN score strings to numbers
//   "-8" → -8  |  "E" → 0  |  "+3" → 3
//
// fmtScore(): converts numbers back to display strings
//   -8 → "-8"  |  0 → "E"  |  3 → "+3"
//
// fmtThru(): cleans up the "Thru" column value
//   Shows "F" (finished), hole number (e.g. "14"), "CUT", or "–"
// ─────────────────────────────────────────────────────────────────
function parseToPar(str) {
  if (!str || str === "-" || str === "") return 0;
  if (str === "E") return 0;
  const n = parseInt(str.replace("+", ""), 10);
  return isNaN(n) ? 0 : n;
}

function fmtScore(val) {
  if (val === null || val === undefined || isNaN(val)) return "–";
  if (val === 0) return "E";
  return val > 0 ? `+${val}` : `${val}`;
}

function fmtThru(raw, status) {
  if (/CUT/.test(status))              return "CUT";
  if (/WITHDRAWN|WD/.test(status))     return "WD";
  if (!raw || raw === "-")             return "–";
  if (/^\d{4}-\d{2}-\d{2}T/.test(raw)) return "–"; // tee time, not yet started
  return raw.replace(/[<>&"]/g, "");
}

// ─────────────────────────────────────────────────────────────────
// COUNTDOWN + META
// updateMeta(): updates the header line showing last updated time
//   and countdown to next refresh (ticks every second)
// startCountdown(): starts the 1-second interval that drives the clock
// ─────────────────────────────────────────────────────────────────
function updateMeta() {
  const metaEl = document.getElementById("meta");
  if (!metaEl || !lastUpdated) return;
  const timeStr = lastUpdated.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  if (!nextRefreshAt) {
    metaEl.textContent = `Last updated ${timeStr}`;
    return;
  }
  const remaining = Math.max(0, nextRefreshAt - Date.now());
  const mins = Math.floor(remaining / 60000);
  const secs = Math.floor((remaining % 60000) / 1000);
  metaEl.textContent = `Updated ${timeStr} · next refresh ${mins}:${String(secs).padStart(2, "0")}`;
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(updateMeta, 1000);
}

// ─────────────────────────────────────────────────────────────────
// TABS
// switchTab(): toggles between Sweepstake and Live Leaderboard views
// ─────────────────────────────────────────────────────────────────
function switchTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('tab-sweepstake').hidden = tab !== 'sweepstake';
  document.getElementById('tab-field').hidden = tab !== 'field';
  if (tab === 'field') renderFieldLeaderboard();
}

// ─────────────────────────────────────────────────────────────────
// FIELD LEADERBOARD
// Renders the full ESPN field sorted by score (lowest first).
// Golfers who appear in any sweeper's picks are highlighted.
// Uses existing golferData — no extra fetch needed.
// ─────────────────────────────────────────────────────────────────
function renderFieldLeaderboard() {
  const entries = Object.entries(golferData)
    .sort((a, b) => a[1].total - b[1].total);

  if (entries.length === 0) {
    document.getElementById('field-container').innerHTML =
      `<div class="loading">No data yet — scores will appear once the tournament starts.</div>`;
    return;
  }

  // Names from all sweepers' picks, for row highlighting
  const pickedNames = new Set(Object.values(PICKS).flatMap(p => p.golfers));

  let html = `<div class="card">
    <div class="card-header field-row field-header">
      <span>#</span><span>Golfer</span><span>Score</span><span>Thru</span>
    </div>`;

  // Compute tied positions
  let pos = 1;
  entries.forEach(([name, g], i) => {
    if (i > 0 && g.total !== entries[i - 1][1].total) pos = i + 1;
    const tied    = entries.filter(([, x]) => x.total === g.total).length > 1;
    const posStr  = tied ? `T${pos}` : `${pos}`;
    const isPicked = pickedNames.has(name);
    const cls     = g.total < 0 ? "score-under" : g.total > 0 ? "score-over" : "score-even";

    html += `<div class="lb-row field-row ${isPicked ? "field-picked" : ""}">
      <span class="lb-pos">${posStr}</span>
      <span class="lb-name">${name}</span>
      <span class="lb-score ${cls}">${fmtScore(g.total)}</span>
      <span class="field-thru">${g.thru}</span>
    </div>`;
  });

  html += `</div>`;
  document.getElementById('field-container').innerHTML = html;
}

// ─────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────
fetchScores();
startCountdown();
setInterval(fetchScores, REFRESH_MS);
</script>
