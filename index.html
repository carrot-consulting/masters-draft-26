<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Draft 2026</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a3a1a;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Header ── */
    header {
      background: #1a3a1a;
      color: #d4af37;
      text-align: center;
      padding: 28px 16px 18px;
      border-bottom: 2px solid #d4af37;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    #tournament-name {
      font-size: 0.8rem;
      color: #b8a060;
      margin-top: 4px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    #meta {
      font-size: 0.75rem;
      color: #8aaa7a;
      margin-top: 6px;
    }

    /* ── Main content ── */
    main {
      max-width: 560px;
      margin: 24px auto 0;
      padding: 0 12px;
    }

    /* ── Leaderboard card ── */
    .card {
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    }

    .card-header {
      display: grid;
      grid-template-columns: 36px 1fr 72px;
      background: #2d5a27;
      color: #d4af37;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 14px;
    }

    .card-header span:last-child { text-align: right; }

    .lb-row {
      display: grid;
      grid-template-columns: 36px 1fr 72px;
      padding: 14px 14px;
      border-bottom: 1px solid #efefef;
      cursor: pointer;
      transition: background 0.12s;
      align-items: center;
    }

    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: #f4f8f4; }
    .lb-row.active { background: #eaf2ea; border-left: 3px solid #2d5a27; }

    .lb-pos {
      font-size: 0.85rem;
      font-weight: 700;
      color: #888;
    }

    .lb-name {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .lb-score {
      font-size: 1.15rem;
      font-weight: 700;
      text-align: right;
    }

    .score-under { color: #c0392b; }
    .score-over  { color: #2c3e50; }
    .score-even  { color: #2d5a27; }

    /* ── Team detail card ── */
    #team-detail {
      display: none;
      margin-top: 14px;
    }

    #team-detail.visible { display: block; }

    .detail-header {
      background: #2d5a27;
      color: #d4af37;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      font-weight: 700;
      font-size: 0.95rem;
    }

    .detail-header .sweeper-score {
      margin-left: 8px;
      font-size: 0.85rem;
      color: #b8a060;
    }

    .close-btn {
      margin-left: auto;
      cursor: pointer;
      font-size: 1.1rem;
      color: #b8a060;
      line-height: 1;
      padding: 2px 4px;
    }

    .close-btn:hover { color: #d4af37; }

    /* ── Golfer row ── */
    .golfer-row {
      padding: 12px 14px;
      border-bottom: 1px solid #efefef;
      background: #fff;
    }

    .golfer-row:last-child { border-bottom: none; }
    .golfer-row.is-captain { background: #fffdf3; }

    .golfer-top {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 8px;
    }

    .golfer-name {
      font-size: 0.93rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .badge {
      font-size: 0.6rem;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge-captain {
      background: #d4af37;
      color: #1a1a1a;
    }

    .badge-cut {
      background: #e74c3c;
      color: #fff;
    }

    .badge-wd {
      background: #95a5a6;
      color: #fff;
    }

    /* ── Round scores ── */
    .rounds {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .round-pill {
      background: #f4f4f4;
      border-radius: 6px;
      padding: 4px 8px;
      text-align: center;
      min-width: 46px;
    }

    .round-pill.captain-r4 {
      background: #fff8e1;
      border: 1px solid #d4af37;
    }

    .round-label {
      font-size: 0.6rem;
      font-weight: 700;
      color: #999;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .round-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 1px;
    }

    .round-value.under { color: #c0392b; }
    .round-value.over  { color: #2c3e50; }
    .round-value.empty { color: #ccc; }

    .multiplier-note {
      font-size: 0.58rem;
      color: #b8860b;
      font-weight: 700;
      margin-top: 1px;
    }

    /* ── States ── */
    .loading {
      text-align: center;
      color: #b8a060;
      padding: 48px 16px;
      font-size: 0.9rem;
    }

    .error-card {
      background: #fff;
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
    }

    .error-card p { color: #c0392b; font-size: 0.9rem; }
    .error-card small { color: #888; font-size: 0.78rem; margin-top: 6px; display: block; }
  </style>
</head>
<body>

<header>
  <h1>&#9971; Masters Draft 2026</h1>
  <div id="tournament-name"></div>
  <div id="meta">Fetching live scores...</div>
</header>

<main>
  <div id="leaderboard-container">
    <div class="loading">Loading scores...</div>
  </div>
  <div id="team-detail"></div>
</main>

<script>
// ─────────────────────────────────────────────────────────────────
// PICKS
// Update golfer names before Masters week — must match ESPN exactly.
// Set captain to a golfer's name (string) on Saturday night before R4.
// NOTE: Special chars (Å, ø) must match ESPN's displayName exactly.
// ─────────────────────────────────────────────────────────────────
const PICKS = {
  "Simo": {
    golfers: ["J.J. Spaun", "Tommy Fleetwood", "Hideki Matsuyama", "Jordan Spieth"],
    captain: "Tommy Fleetwood"
  },
  "Fred": {
    golfers: ["Matt Wallace", "Andrew Putnam", "Bud Cauley", "Tony Finau"],
    captain: "Tony Finau"
  },
  "Toz": {
    golfers: ["Michael Kim", "Austin Eckroat", "Nick Taylor", "Billy Horschel"],
    captain: "Nick Taylor"
  },
  "Jack E": {
    golfers: ["Robert MacIntyre", "Si Woo Kim", "Maverick McNealy", "Thorbjørn Olesen"],
    captain: "Robert MacIntyre"
  },
  "Jack W": {
    golfers: ["Ludvig Åberg", "Kristoffer Reitan", "Sam Ryder", "Gordon Sargent"],
    captain: "Sam Ryder"
  },
  "Liam": {
    golfers: ["Andrew Novak", "Marco Penge", "Zach Bauchou", "Christo Lamprecht"],
    captain: "Christo Lamprecht"
  }
};

// ─────────────────────────────────────────────────────────────────
// CONFIG
// For Masters week: if league=pga doesn't return Masters data,
// try league=masters as the param. Verify Thursday April 9.
// ─────────────────────────────────────────────────────────────────
const API_URL   = "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga";
const REFRESH_MS = 10 * 60 * 1000; // 10 minutes

// ─────────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────────
let golferData     = {};  // { "Name": { total, rounds[], thru, status, isCut } }
let activeSweeper  = null;
let nextRefreshAt  = null;
let countdownTimer = null;
let lastUpdated    = null;

// ─────────────────────────────────────────────────────────────────
// FETCH
// ─────────────────────────────────────────────────────────────────
async function fetchScores() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    // Full response logged for Valero testing — inspect field names in console
    console.log("[masters-draft] Full ESPN API response:", data);

    parseScores(data);
    renderLeaderboard();

    lastUpdated = new Date();
    nextRefreshAt = Date.now() + REFRESH_MS;
    updateMeta();

  } catch (err) {
    console.error("[masters-draft] Fetch error:", err);
    document.getElementById("meta").textContent = "Error fetching scores — retrying in 10 min";
  }
}

// ─────────────────────────────────────────────────────────────────
// PARSE
// ─────────────────────────────────────────────────────────────────
function parseScores(data) {
  golferData = {};

  const event       = data.events?.[0];
  const competitors = event?.competitions?.[0]?.competitors ?? [];

  const tournamentEl = document.getElementById("tournament-name");
  if (tournamentEl && event?.name) tournamentEl.textContent = event.name;

  console.log(`[masters-draft] Parsing ${competitors.length} players from: ${event?.name}`);

  for (const comp of competitors) {
    const name = comp.athlete?.displayName;
    if (!name) continue;

    const totalVal  = parseToPar(comp.score?.displayValue);
    const statusStr = comp.status?.type?.name ?? "";
    const thruRaw   = comp.status?.displayValue ?? "";

    // linescores: one entry per round played, parsed as score to par
    const rounds = (comp.linescores ?? []).map(ls => ({
      value:   parseToPar(ls.displayValue),
      display: ls.displayValue ?? "–"
    }));

    golferData[name] = {
      total:        totalVal,
      totalDisplay: fmtScore(totalVal),
      rounds,
      thru:         fmtThru(thruRaw, statusStr),
      isCut:        /CUT/.test(statusStr),
      isWD:         /WITHDRAWN|WD/.test(statusStr),
    };
  }

  // Warn about any name mismatches — fix spellings against these warnings
  for (const [sweeper, { golfers }] of Object.entries(PICKS)) {
    for (const name of golfers) {
      if (!golferData[name]) {
        console.warn(`[masters-draft] ⚠️ No match for "${name}" (${sweeper}) — check spelling vs ESPN`);
      }
    }
  }

  console.log("[masters-draft] Parsed golfer data:", golferData);
}

// ─────────────────────────────────────────────────────────────────
// SCORE CALCULATION
// Captain R4 multiplier: add one extra copy of captain's R4 score.
// This effectively doubles their R4 contribution to sweeper total.
// Only applied once R4 data exists and captain is set.
// ─────────────────────────────────────────────────────────────────
function calcSweeper(key) {
  const { golfers, captain } = PICKS[key];

  let total = 0;
  for (const name of golfers) {
    total += golferData[name]?.total ?? 0;
  }

  if (captain && golferData[captain]) {
    const r4 = golferData[captain].rounds[3]; // index 3 = Round 4
    if (r4 && r4.value !== null) {
      total += r4.value; // extra copy = double the R4 contribution
    }
  }

  return total;
}

// ─────────────────────────────────────────────────────────────────
// RENDER LEADERBOARD
// ─────────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const sorted = Object.keys(PICKS)
    .map(key => ({ key, score: calcSweeper(key) }))
    .sort((a, b) => a.score - b.score);

  let html = `<div class="card">
    <div class="card-header">
      <span>#</span><span>Player</span><span>Score</span>
    </div>`;

  sorted.forEach(({ key, score }, i) => {
    const cls    = score < 0 ? "score-under" : score > 0 ? "score-over" : "score-even";
    const active = key === activeSweeper ? "active" : "";
    html += `
      <div class="lb-row ${active}" onclick="toggleDetail('${key}')">
        <span class="lb-pos">${i + 1}</span>
        <span class="lb-name">${key}</span>
        <span class="lb-score ${cls}">${fmtScore(score)}</span>
      </div>`;
  });

  html += `</div>`;
  document.getElementById("leaderboard-container").innerHTML = html;

  if (activeSweeper) renderDetail(activeSweeper);
}

// ─────────────────────────────────────────────────────────────────
// RENDER TEAM DETAIL
// ─────────────────────────────────────────────────────────────────
function renderDetail(key) {
  const { golfers, captain } = PICKS[key];
  const sweeperScore = calcSweeper(key);
  const detailEl = document.getElementById("team-detail");

  let html = `
    <div class="card">
      <div class="detail-header">
        ${key}'s Team
        <span class="sweeper-score">${fmtScore(sweeperScore)} combined</span>
        <span class="close-btn" onclick="closeDetail()">&#10005;</span>
      </div>`;

  for (const name of golfers) {
    const g = golferData[name];
    const isCaptain = name === captain;
    const isCut = g?.isCut ?? false;
    const isWD  = g?.isWD  ?? false;

    html += `<div class="golfer-row ${isCaptain ? "is-captain" : ""}">
      <div class="golfer-top">
        <span class="golfer-name">${name}</span>
        ${isCaptain ? `<span class="badge badge-captain">C</span>` : ""}
        ${isCut     ? `<span class="badge badge-cut">CUT</span>` : ""}
        ${isWD      ? `<span class="badge badge-wd">WD</span>` : ""}
      </div>
      <div class="rounds">`;

    // Total pill
    const tot = g?.total ?? 0;
    const totCls = tot < 0 ? "under" : tot > 0 ? "over" : "";
    html += `<div class="round-pill">
      <div class="round-label">Tot</div>
      <div class="round-value ${totCls}">${g ? fmtScore(tot) : "–"}</div>
    </div>`;

    // R1–R4 pills
    ["R1","R2","R3","R4"].forEach((label, idx) => {
      const r = g?.rounds[idx];
      const isCaptainR4 = isCaptain && captain && idx === 3;

      if (r && r.value !== null) {
        let displayVal = fmtScore(r.value);
        let multiplierNote = "";
        if (isCaptainR4) {
          displayVal = fmtScore(r.value * 2);
          multiplierNote = `<div class="multiplier-note">&#215;2</div>`;
        }
        const rCls = r.value < 0 ? "under" : r.value > 0 ? "over" : "";
        html += `<div class="round-pill ${isCaptainR4 ? "captain-r4" : ""}">
          <div class="round-label">${label}</div>
          <div class="round-value ${rCls}">${displayVal}</div>
          ${multiplierNote}
        </div>`;
      } else {
        html += `<div class="round-pill">
          <div class="round-label">${label}</div>
          <div class="round-value empty">–</div>
        </div>`;
      }
    });

    // Thru pill
    html += `<div class="round-pill">
      <div class="round-label">Thru</div>
      <div class="round-value" style="font-size:0.75rem">${g?.thru ?? "–"}</div>
    </div>`;

    html += `</div></div>`;  // close .rounds + .golfer-row
  }

  html += `</div>`;  // close .card
  detailEl.innerHTML = html;
  detailEl.classList.add("visible");
  detailEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// ─────────────────────────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────────────────────────
function toggleDetail(key) {
  if (activeSweeper === key) {
    closeDetail();
  } else {
    activeSweeper = key;
    renderLeaderboard();
  }
}

function closeDetail() {
  activeSweeper = null;
  document.getElementById("team-detail").classList.remove("visible");
  renderLeaderboard();
}

// ─────────────────────────────────────────────────────────────────
// HELPERS
// ─────────────────────────────────────────────────────────────────
// Parses ESPN to-par display strings: "-8" → -8, "E" → 0, "+3" → 3
function parseToPar(str) {
  if (!str || str === "-" || str === "") return 0;
  if (str === "E") return 0;
  const n = parseInt(str.replace("+", ""), 10);
  return isNaN(n) ? 0 : n;
}

function fmtScore(val) {
  if (val === null || val === undefined || isNaN(val)) return "–";
  if (val === 0) return "E";
  return val > 0 ? `+${val}` : `${val}`;
}

function fmtThru(raw, status) {
  if (/CUT/.test(status))       return "CUT";
  if (/WITHDRAWN|WD/.test(status)) return "WD";
  if (!raw || raw === "-")      return "–";
  return raw;
}

// ─────────────────────────────────────────────────────────────────
// COUNTDOWN + META
// ─────────────────────────────────────────────────────────────────
function updateMeta() {
  const metaEl = document.getElementById("meta");
  if (!metaEl || !lastUpdated) return;
  const timeStr = lastUpdated.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  if (!nextRefreshAt) {
    metaEl.textContent = `Last updated ${timeStr}`;
    return;
  }
  const remaining = Math.max(0, nextRefreshAt - Date.now());
  const mins = Math.floor(remaining / 60000);
  const secs = Math.floor((remaining % 60000) / 1000);
  metaEl.textContent = `Updated ${timeStr} · next refresh ${mins}:${String(secs).padStart(2, "0")}`;
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(updateMeta, 1000);
}

// ─────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────
fetchScores();
startCountdown();
setInterval(fetchScores, REFRESH_MS);
</script>

</body>
</html>
