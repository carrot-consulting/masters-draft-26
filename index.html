<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masters Draft 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600;1,700&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0ede8;
      min-height: 100vh;
      padding-bottom: 48px;
    }

    /* ── Header ── */
    header {
      background: #fff;
      border-bottom: 3px solid #006747;
      text-align: center;
      padding: 22px 16px 16px;
    }

    header h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1.9rem;
      font-weight: 700;
      color: #006747;
      letter-spacing: 0.01em;
    }

    #tournament-name {
      font-size: 0.72rem;
      color: #888;
      margin-top: 5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
    }

    #meta {
      font-size: 0.73rem;
      color: #C9A84C;
      margin-top: 5px;
      font-weight: 400;
    }

    /* ── Main content ── */
    main {
      max-width: 560px;
      margin: 28px auto 0;
      padding: 0 12px;
    }

    /* ── Leaderboard card ── */
    .card {
      background: #fff;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.1);
      border-top: 3px solid #006747;
    }

    .card-header {
      display: grid;
      grid-template-columns: 36px 1fr 72px;
      background: #006747;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 9px 14px;
    }

    .card-header span:last-child { text-align: right; }

    .lb-row {
      display: grid;
      grid-template-columns: 36px 1fr 72px;
      padding: 14px 14px;
      border-bottom: 1px solid #f0ede8;
      cursor: pointer;
      transition: background 0.12s;
      align-items: center;
    }

    .lb-row:last-child { border-bottom: none; }
    .lb-row:hover { background: #fafaf8; }
    .lb-row.active { background: #f5f9f6; border-left: 3px solid #006747; }

    .lb-pos {
      font-size: 0.82rem;
      font-weight: 600;
      color: #aaa;
    }

    .lb-name {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .lb-score {
      font-size: 1.1rem;
      font-weight: 700;
      text-align: right;
      font-family: 'Source Sans 3', sans-serif;
    }

    .score-under { color: #c0392b; }
    .score-over  { color: #333; }
    .score-even  { color: #006747; }

    /* ── Team detail card ── */
    #team-detail {
      display: none;
      margin-top: 12px;
    }

    #team-detail.visible { display: block; }

    .detail-header {
      background: #006747;
      color: #fff;
      padding: 12px 14px;
      display: flex;
      align-items: center;
      font-family: 'Playfair Display', Georgia, serif;
      font-style: italic;
      font-size: 1rem;
      font-weight: 600;
    }

    .detail-header .sweeper-score {
      margin-left: 8px;
      font-size: 0.8rem;
      color: #C9A84C;
      font-family: 'Source Sans 3', sans-serif;
      font-style: normal;
      font-weight: 400;
    }

    .close-btn {
      margin-left: auto;
      cursor: pointer;
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      line-height: 1;
      padding: 2px 4px;
      font-style: normal;
      font-family: 'Source Sans 3', sans-serif;
    }

    .close-btn:hover { color: #fff; }

    /* ── Golfer row ── */
    .golfer-row {
      padding: 12px 14px;
      border-bottom: 1px solid #f0ede8;
      background: #fff;
    }

    .golfer-row:last-child { border-bottom: none; }
    .golfer-row.is-captain { background: #fdfbf5; border-left: 2px solid #C9A84C; }

    .golfer-top {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 8px;
    }

    .golfer-name {
      font-size: 0.92rem;
      font-weight: 600;
      color: #1a1a1a;
    }

    .badge {
      font-size: 0.58rem;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 2px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .badge-captain {
      background: #C9A84C;
      color: #fff;
    }

    .badge-cut {
      background: #c0392b;
      color: #fff;
    }

    .badge-wd {
      background: #aaa;
      color: #fff;
    }

    /* ── Round scores ── */
    .rounds {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .round-pill {
      background: #f5f5f2;
      border-radius: 2px;
      padding: 4px 8px;
      text-align: center;
      min-width: 46px;
    }

    .round-pill.captain-r4 {
      background: #fdfbf0;
      border: 1px solid #C9A84C;
    }

    .round-label {
      font-size: 0.58rem;
      font-weight: 700;
      color: #aaa;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .round-value {
      font-size: 0.85rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-top: 1px;
    }

    .round-value.under { color: #c0392b; }
    .round-value.over  { color: #333; }
    .round-value.empty { color: #ddd; }

    .multiplier-note {
      font-size: 0.56rem;
      color: #C9A84C;
      font-weight: 700;
      margin-top: 1px;
    }

    /* ── States ── */
    .loading {
      text-align: center;
      color: #aaa;
      padding: 48px 16px;
      font-size: 0.9rem;
      background: #fff;
    }

    .error-card {
      background: #fff;
      border-radius: 2px;
      padding: 28px 16px;
      text-align: center;
    }

    .error-card p { color: #c0392b; font-size: 0.9rem; }
    .error-card small { color: #aaa; font-size: 0.78rem; margin-top: 6px; display: block; }
  </style>
</head>
<body>

<header>
  <h1>&#9971; Masters Draft 2026</h1>
  <div id="tournament-name"></div>
  <div id="meta">Fetching live scores...</div>
</header>

<main>
  <div id="leaderboard-container">
    <div class="loading">Loading scores...</div>
  </div>
  <div id="team-detail"></div>
</main>

<script>
/*
 * ═══════════════════════════════════════════════════════════════
 * HOW THIS PAGE WORKS (overview)
 * ═══════════════════════════════════════════════════════════════
 *
 * On load (and every 10 minutes):
 *   1. fetchScores()  → calls ESPN API to get live golf scores
 *   2. parseScores()  → extracts each golfer's total + round scores
 *   3. calcSweeper()  → adds up each person's 4 golfers (+ captain bonus)
 *   4. renderLeaderboard() → sorts and draws the main table
 *
 * On click:
 *   toggleDetail() → expands that person's 4 golfers below the table
 *
 * TO UPDATE PICKS (Wednesday after draft):
 *   - Replace golfer names in PICKS below
 *   - Names must match ESPN exactly (check browser console for warnings)
 *   - Leave captain as null until Saturday night
 *
 * TO SET CAPTAINS (Saturday night before R4):
 *   - Change captain: null  →  captain: "Golfer Name"  for each person
 * ═══════════════════════════════════════════════════════════════
 */

// ─────────────────────────────────────────────────────────────────
// PICKS
// The 6 sweepers and their 4 golfers each.
// captain: null  →  no bonus applied yet
// captain: "Name"  →  that golfer's R4 score is doubled on Sunday
//
// ⚠️  Names must match ESPN's displayName exactly.
//     Open browser console after loading — any mismatches show as warnings.
// ─────────────────────────────────────────────────────────────────
const PICKS = {
  "Simo": {
    golfers: ["J.J. Spaun", "Tommy Fleetwood", "Hideki Matsuyama", "Jordan Spieth"],
    captain: "Tommy Fleetwood"
  },
  "Fred": {
    golfers: ["Matt Wallace", "Andrew Putnam", "Bud Cauley", "Tony Finau"],
    captain: "Tony Finau"
  },
  "Toz": {
    golfers: ["Michael Kim", "Austin Eckroat", "Nick Taylor", "Billy Horschel"],
    captain: "Nick Taylor"
  },
  "Jack E": {
    golfers: ["Robert MacIntyre", "Si Woo Kim", "Maverick McNealy", "Thorbjørn Olesen"],
    captain: "Robert MacIntyre"
  },
  "Jack W": {
    golfers: ["Ludvig Åberg", "Kristoffer Reitan", "Sam Ryder", "Gordon Sargent"],
    captain: "Sam Ryder"
  },
  "Liam": {
    golfers: ["Andrew Novak", "Marco Penge", "Zach Bauchou", "Christo Lamprecht"],
    captain: "Christo Lamprecht"
  }
};

// ─────────────────────────────────────────────────────────────────
// CONFIG
// API_URL: where we get live scores from (ESPN's unofficial golf API)
// REFRESH_MS: how often to re-fetch (10 minutes = 600,000 ms)
//
// ⚠️  Masters week: if scores don't load on Thursday, change
//     league=pga  →  league=masters  in the URL below
// ─────────────────────────────────────────────────────────────────
const API_URL    = "https://site.api.espn.com/apis/site/v2/sports/golf/leaderboard?league=pga";
const REFRESH_MS = 10 * 60 * 1000; // 10 minutes

// ─────────────────────────────────────────────────────────────────
// STATE  (don't touch — managed automatically)
// golferData:    live scores keyed by golfer name, filled by parseScores()
// activeSweeper: which sweeper's team is currently expanded (or null)
// nextRefreshAt: timestamp of the next auto-refresh
// countdownTimer: the interval that ticks the countdown clock
// lastUpdated:   when scores were last successfully fetched
// ─────────────────────────────────────────────────────────────────
let golferData     = {};
let activeSweeper  = null;
let nextRefreshAt  = null;
let countdownTimer = null;
let lastUpdated    = null;

// ─────────────────────────────────────────────────────────────────
// FETCH
// Calls the ESPN API and kicks off the parse + render chain.
// Runs on page load and every 10 minutes automatically.
// If the fetch fails, shows an error in the header and retries next cycle.
// ─────────────────────────────────────────────────────────────────
async function fetchScores() {
  try {
    const res = await fetch(API_URL);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();

    parseScores(data);
    renderLeaderboard();

    lastUpdated = new Date();
    nextRefreshAt = Date.now() + REFRESH_MS;
    updateMeta();

  } catch (err) {
    console.error("[masters-draft] Fetch error:", err);
    document.getElementById("meta").textContent = "Error fetching scores — retrying in 10 min";
  }
}

// ─────────────────────────────────────────────────────────────────
// PARSE
// Takes raw ESPN API data and builds the golferData lookup table:
//   golferData["Rory McIlroy"] = { total: -8, rounds: [...], thru: "F", isCut: false }
//
// Also logs a warning for any golfer in PICKS not found in the API —
// that means the name in PICKS doesn't match ESPN's spelling.
// ─────────────────────────────────────────────────────────────────
function parseScores(data) {
  golferData = {};

  const event       = data.events?.[0];
  const competitors = event?.competitions?.[0]?.competitors ?? [];

  const tournamentEl = document.getElementById("tournament-name");
  if (tournamentEl && event?.name) tournamentEl.textContent = event.name;

  for (const comp of competitors) {
    const name = comp.athlete?.displayName;
    if (!name) continue;

    const totalVal  = parseToPar(comp.score?.displayValue);
    const statusStr = comp.status?.type?.name ?? "";
    const thruRaw   = comp.status?.displayValue ?? "";

    // linescores: one entry per round played, parsed as score to par
    const rounds = (comp.linescores ?? []).map(ls => ({
      value:   parseToPar(ls.displayValue),
      display: ls.displayValue ?? "–"
    }));

    golferData[name] = {
      total:        totalVal,
      totalDisplay: fmtScore(totalVal),
      rounds,
      thru:         fmtThru(thruRaw, statusStr),
      isCut:        /CUT/.test(statusStr),
      isWD:         /WITHDRAWN|WD/.test(statusStr),
    };
  }

  // Warn about any name mismatches — fix spellings against these warnings
  for (const [sweeper, { golfers }] of Object.entries(PICKS)) {
    for (const name of golfers) {
      if (!golferData[name]) {
        console.warn(`[masters-draft] ⚠️ No match for "${name}" (${sweeper}) — check spelling vs ESPN`);
      }
    }
  }

}

// ─────────────────────────────────────────────────────────────────
// SCORE CALCULATION
// Adds up a sweeper's combined score from their 4 golfers.
//
// Normal scoring:  total = golfer1 + golfer2 + golfer3 + golfer4
// Captain bonus:   if R4 is live and captain is set,
//                  add one extra copy of the captain's R4 score
//                  (this doubles their R4 contribution)
//
// Example: captain shoots -4 on Sunday → counts as -8 for that sweeper
// ─────────────────────────────────────────────────────────────────
function calcSweeper(key) {
  const { golfers, captain } = PICKS[key];

  let total = 0;
  for (const name of golfers) {
    total += golferData[name]?.total ?? 0;
  }

  if (captain && golferData[captain]) {
    const r4 = golferData[captain].rounds[3]; // index 3 = Round 4
    if (r4 && r4.value !== null) {
      total += r4.value; // extra copy = double the R4 contribution
    }
  }

  return total;
}

// ─────────────────────────────────────────────────────────────────
// RENDER LEADERBOARD
// Calculates every sweeper's score, sorts lowest-to-highest (golf),
// and draws the main 6-row table.
// Called after every fetch and after any click interaction.
// ─────────────────────────────────────────────────────────────────
function renderLeaderboard() {
  const sorted = Object.keys(PICKS)
    .map(key => ({ key, score: calcSweeper(key) }))
    .sort((a, b) => a.score - b.score);

  let html = `<div class="card">
    <div class="card-header">
      <span>#</span><span>Player</span><span>Score</span>
    </div>`;

  sorted.forEach(({ key, score }, i) => {
    const cls    = score < 0 ? "score-under" : score > 0 ? "score-over" : "score-even";
    const active = key === activeSweeper ? "active" : "";
    html += `
      <div class="lb-row ${active}" onclick="toggleDetail('${key}')">
        <span class="lb-pos">${i + 1}</span>
        <span class="lb-name">${key}</span>
        <span class="lb-score ${cls}">${fmtScore(score)}</span>
      </div>`;
  });

  html += `</div>`;
  document.getElementById("leaderboard-container").innerHTML = html;

  if (activeSweeper) renderDetail(activeSweeper);
}

// ─────────────────────────────────────────────────────────────────
// RENDER TEAM DETAIL
// Draws the expanded card below the leaderboard showing a sweeper's
// 4 golfers with their individual round-by-round scores.
// Captain row is highlighted gold. Captain's R4 pill shows doubled score.
// ─────────────────────────────────────────────────────────────────
function renderDetail(key) {
  const { golfers, captain } = PICKS[key];
  const sweeperScore = calcSweeper(key);
  const detailEl = document.getElementById("team-detail");

  let html = `
    <div class="card">
      <div class="detail-header">
        ${key}'s Team
        <span class="sweeper-score">${fmtScore(sweeperScore)} combined</span>
        <span class="close-btn" onclick="closeDetail()">&#10005;</span>
      </div>`;

  for (const name of golfers) {
    const g = golferData[name];
    const isCaptain = name === captain;
    const isCut = g?.isCut ?? false;
    const isWD  = g?.isWD  ?? false;

    html += `<div class="golfer-row ${isCaptain ? "is-captain" : ""}">
      <div class="golfer-top">
        <span class="golfer-name">${name}</span>
        ${isCaptain ? `<span class="badge badge-captain">C</span>` : ""}
        ${isCut     ? `<span class="badge badge-cut">CUT</span>` : ""}
        ${isWD      ? `<span class="badge badge-wd">WD</span>` : ""}
      </div>
      <div class="rounds">`;

    // Total pill
    const tot = g?.total ?? 0;
    const totCls = tot < 0 ? "under" : tot > 0 ? "over" : "";
    html += `<div class="round-pill">
      <div class="round-label">Tot</div>
      <div class="round-value ${totCls}">${g ? fmtScore(tot) : "–"}</div>
    </div>`;

    // R1–R4 pills
    ["R1","R2","R3","R4"].forEach((label, idx) => {
      const r = g?.rounds[idx];
      const isCaptainR4 = isCaptain && captain && idx === 3;

      if (r && r.value !== null) {
        let displayVal = fmtScore(r.value);
        let multiplierNote = "";
        if (isCaptainR4) {
          displayVal = fmtScore(r.value * 2);
          multiplierNote = `<div class="multiplier-note">&#215;2</div>`;
        }
        const rCls = r.value < 0 ? "under" : r.value > 0 ? "over" : "";
        html += `<div class="round-pill ${isCaptainR4 ? "captain-r4" : ""}">
          <div class="round-label">${label}</div>
          <div class="round-value ${rCls}">${displayVal}</div>
          ${multiplierNote}
        </div>`;
      } else {
        html += `<div class="round-pill">
          <div class="round-label">${label}</div>
          <div class="round-value empty">–</div>
        </div>`;
      }
    });

    // Thru pill
    html += `<div class="round-pill">
      <div class="round-label">Thru</div>
      <div class="round-value" style="font-size:0.75rem">${g?.thru ?? "–"}</div>
    </div>`;

    html += `</div></div>`;  // close .rounds + .golfer-row
  }

  html += `</div>`;  // close .card
  detailEl.innerHTML = html;
  detailEl.classList.add("visible");
  detailEl.scrollIntoView({ behavior: "smooth", block: "nearest" });
}

// ─────────────────────────────────────────────────────────────────
// INTERACTIONS
// toggleDetail(): called when a leaderboard row is clicked
//   - if that sweeper is already open → close it
//   - otherwise → open that sweeper's team detail
// closeDetail(): hides the team detail card and clears the selection
// ─────────────────────────────────────────────────────────────────
function toggleDetail(key) {
  if (activeSweeper === key) {
    closeDetail();
  } else {
    activeSweeper = key;
    renderLeaderboard();
  }
}

function closeDetail() {
  activeSweeper = null;
  document.getElementById("team-detail").classList.remove("visible");
  renderLeaderboard();
}

// ─────────────────────────────────────────────────────────────────
// HELPERS
// parseToPar(): converts ESPN score strings to numbers
//   "-8" → -8  |  "E" → 0  |  "+3" → 3
//
// fmtScore(): converts numbers back to display strings
//   -8 → "-8"  |  0 → "E"  |  3 → "+3"
//
// fmtThru(): cleans up the "Thru" column value
//   Shows "F" (finished), hole number (e.g. "14"), "CUT", or "–"
// ─────────────────────────────────────────────────────────────────
function parseToPar(str) {
  if (!str || str === "-" || str === "") return 0;
  if (str === "E") return 0;
  const n = parseInt(str.replace("+", ""), 10);
  return isNaN(n) ? 0 : n;
}

function fmtScore(val) {
  if (val === null || val === undefined || isNaN(val)) return "–";
  if (val === 0) return "E";
  return val > 0 ? `+${val}` : `${val}`;
}

function fmtThru(raw, status) {
  if (/CUT/.test(status))       return "CUT";
  if (/WITHDRAWN|WD/.test(status)) return "WD";
  if (!raw || raw === "-")      return "–";
  return raw;
}

// ─────────────────────────────────────────────────────────────────
// COUNTDOWN + META
// updateMeta(): updates the header line showing last updated time
//   and countdown to next refresh (ticks every second)
// startCountdown(): starts the 1-second interval that drives the clock
// ─────────────────────────────────────────────────────────────────
function updateMeta() {
  const metaEl = document.getElementById("meta");
  if (!metaEl || !lastUpdated) return;
  const timeStr = lastUpdated.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
  if (!nextRefreshAt) {
    metaEl.textContent = `Last updated ${timeStr}`;
    return;
  }
  const remaining = Math.max(0, nextRefreshAt - Date.now());
  const mins = Math.floor(remaining / 60000);
  const secs = Math.floor((remaining % 60000) / 1000);
  metaEl.textContent = `Updated ${timeStr} · next refresh ${mins}:${String(secs).padStart(2, "0")}`;
}

function startCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  countdownTimer = setInterval(updateMeta, 1000);
}

// ─────────────────────────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────────────────────────
fetchScores();
startCountdown();
setInterval(fetchScores, REFRESH_MS);
</script>

</body>
</html>
